<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inove Dev Studio - Gerador de Projetos IA</title>
    <meta name="theme-color" content="#0d1b2a">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/styles.css">

    <style>
        body {
            background-color: #050a12;
            color: #fff;
            height: 100dvh; /* dvh garante que o mobile não corte com o teclado */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Open Sans', sans-serif;
        }

        /* Header Minimalista */
        .studio-header {
            background: rgba(13, 27, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .studio-logo {
            max-height: 35px;
        }

        /* Main Chat Area */
        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            overflow: hidden;
        }

        #aiChatWindow {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            /* Hide scrollbar */
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }

        #aiChatWindow::-webkit-scrollbar {
            width: 6px;
        }
        #aiChatWindow::-webkit-scrollbar-thumb {
            background-color: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        /* Mensagens da IA e Usuário */
        .ai-message {
            max-width: 85%;
            padding: 15px 22px;
            border-radius: 20px;
            font-size: 1.05rem;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-out;
            word-wrap: break-word;
        }

        .ai-message.bot {
            align-self: flex-start;
            background: #0d1b2a;
            border: 1px solid rgba(0, 199, 183, 0.3);
            border-bottom-left-radius: 5px;
            color: #e0e0e0;
        }

        .ai-message.user {
            align-self: flex-end;
            background: #00C7B7;
            color: #050a12;
            font-weight: 500;
            border-bottom-right-radius: 5px;
        }

        /* Input Area */
        .input-area {
            background: #0d1b2a;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            align-items: center;
        }

        #aiInput {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.1rem;
        }
        #aiInput:focus {
            outline: none;
            box-shadow: none;
        }

        .btn-send {
            background: #00C7B7;
            color: #050a12;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .btn-send:hover {
            transform: scale(1.1);
        }
        .btn-send:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: scale(1);
        }

        /* Sugestões */
        .suggestions-wrapper {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-top: 15px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .suggestions-wrapper::-webkit-scrollbar {
            display: none;
        }
        
        .suggestion-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ccc;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.95rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .suggestion-btn:hover {
            background: rgba(0, 199, 183, 0.1);
            color: #00C7B7;
            border-color: #00C7B7;
        }

        .typing-indicator::after {
            content: '...';
            animation: typing 1.5s infinite;
        }
        @keyframes typing {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="studio-header">
        <a href="index.html">
            <img src="assets/logo.png" alt="Inove Dev" class="studio-logo">
        </a>
        <div class="d-flex align-items-center gap-3">
            <span class="badge bg-dark border border-warning text-warning px-3 py-2 rounded-pill d-none d-sm-inline-block">
                <i class="bi bi-stars"></i> IA Gemini Ativa
            </span>
            <button id="aiClearBtn" class="btn btn-outline-danger btn-sm rounded-pill px-3" title="Reiniciar Conversa">
                <i class="bi bi-arrow-counterclockwise me-1"></i> Reiniciar
            </button>
        </div>
    </header>

    <!-- Chat Area -->
    <main class="chat-container">
        
        <div id="aiChatWindow">
            <!-- A mensagem inicial é preenchida pelo próprio JS, mas deixamos vazia ou configurada no script -->
        </div>

        <div class="suggestions-wrapper">
            <button class="suggestion-btn" data-prompt="Quero uma landing page para minha clínica odontológica chamada Sorriso Ideal.">Clínica Odontológica</button>
            <button class="suggestion-btn" data-prompt="Crie um site para minha hamburgueria artesanal chamada Burger King.">Hamburgueria Artesanal</button>
            <button class="suggestion-btn" data-prompt="Preciso de um portfólio para mim, sou designer gráfico.">Portfólio de Design</button>
            <button class="suggestion-btn" data-prompt="Crie um site institucional para meu escritório de advocacia.">Escritório de Advocacia</button>
        </div>

        <div class="input-area">
            <input type="text" id="aiInput" placeholder="Descreva sua ideia ou negócio aqui..." autocomplete="off" autofocus>
            <button id="aiSendBtn" class="btn-send">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
        
    </main>

    <!-- Bootstrap JS (Necessário se tiver componentes como tooltips futuramente) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Integração do Script Principal da IA -->
    <script type="module" src="js/ai-chat.js"></script>

    <!-- Integração do Tawk.to para Handover Humano -->
    <script type="text/javascript">
        var Tawk_API = Tawk_API || {};
        window.callHumanAgent = function(summary) {
            if (window.Tawk_API) {
                Tawk_API.maximize();
                Tawk_API.addEvent('ai-handover', { 'summary': summary });
                Tawk_API.sendMessage('Olá! Estive conversando com a IA no Studio e gostaria de falar com um especialista. Segue o contexto: ' + (summary || 'Interesse em projetos.'));
            }
        };
        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true;
            s1.src='https://embed.tawk.to/68c6c8ac242109192a3134f0/1j547vp7a';
            s1.charset='UTF-8';
            s1.setAttribute('crossorigin','*');
            s0.parentNode.insertBefore(s1,s0);
        })();
    </script>
</body>
</html>
